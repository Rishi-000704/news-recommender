<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - NeuroFeed</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo/Title -->
            <div class="auth-header">
                <h1 class="logo">🧠 NeuroFeed</h1>
                <p class="tagline">Hyper-Personalized News</p>
            </div>

            <!-- Signup Form -->
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Your display name"
                        required
                    >
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="you@example.com"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                        required
                    >
                    <span class="error-message" id="passwordError"></span>
                    <div class="password-requirements">
                        <small>• At least 8 characters</small>
                        <small>• Mix of letters and numbers</small>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="••••••••"
                        required
                    >
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <!-- General Error Message -->
                <div class="error-message" id="generalError"></div>

                <!-- Loading State -->
                <button 
                    type="submit" 
                    id="signupBtn" 
                    class="btn btn-primary btn-large"
                >
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>or</span>
            </div>

            <!-- Continue as Guest -->
            <button id="guestBtn" class="btn btn-secondary btn-large">
                Continue as Guest
            </button>

            <!-- Login Link -->
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="link">Sign in</a></p>
                <p><a href="index.html" class="link">Back to App</a></p>
            </div>
        </div>

        <!-- Background Gradient -->
        <div class="gradient-bg"></div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Signup Form Handler
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await handleSignup();
        });

        // Guest Button Handler
        document.getElementById('guestBtn').addEventListener('click', async () => {
            const guestId = 'guest_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('userId', guestId);
            localStorage.setItem('isGuest', 'true');
            window.location.href = 'index.html';
        });

        async function handleSignup() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const signupBtn = document.getElementById('signupBtn');

            // Clear previous errors
            clearErrors();

            // Validation
            if (!username || username.length < 3) {
                document.getElementById('usernameError').textContent = 'Username must be at least 3 characters';
                return;
            }

            if (!/^[A-Za-z0-9_]+$/.test(username)) {
                document.getElementById('usernameError').textContent = 'Username may only contain letters, numbers, and underscores';
                return;
            }

            if (!email) {
                document.getElementById('emailError').textContent = 'Email is required';
                return;
            }

            if (!isValidEmail(email)) {
                document.getElementById('emailError').textContent = 'Invalid email format';
                return;
            }

            if (!password || password.length < 8) {
                document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
                return;
            }

            if (!/[a-zA-Z]/.test(password) || !/[0-9]/.test(password)) {
                document.getElementById('passwordError').textContent = 'Password must contain letters and numbers';
                return;
            }

            if (password !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
                return;
            }

            // Show loading state
            setButtonLoading(signupBtn, true);

            try {
                const response = await fetch('/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store auth token and user info
                    localStorage.setItem('userId', data.user_id);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('token', data.token);
                    localStorage.removeItem('isGuest');
                    
                    // Redirect to app
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('generalError').textContent = 
                        data.detail || 'Signup failed. Please try again.';
                }
            } catch (error) {
                document.getElementById('generalError').textContent = 'Connection error. Please try again.';
                console.error('Signup error:', error);
            } finally {
                setButtonLoading(signupBtn, false);
            }
        }

        function clearErrors() {
            document.getElementById('usernameError').textContent = '';
            document.getElementById('emailError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            document.getElementById('confirmPasswordError').textContent = '';
            document.getElementById('generalError').textContent = '';
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function setButtonLoading(btn, isLoading) {
            if (isLoading) {
                btn.disabled = true;
                btn.classList.add('loading');
            } else {
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
